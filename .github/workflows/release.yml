name: Release Plugin

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build or repair
        required: true
        default: v2.1.14

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: so
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            ext: so
          - goos: darwin
            goarch: arm64
            runner: macos-15
            ext: dylib
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: dll

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_TAG}"
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "invalid release tag: ${tag}" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: false

      - name: Install Linux C toolchain
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Test
        run: go test ./... -count=1

      - name: Build dynamic library
        id: build
        shell: bash
        env:
          CGO_ENABLED: "1"
          VERSION: ${{ steps.release.outputs.version }}
          GOOS_NAME: ${{ matrix.goos }}
          GOARCH_NAME: ${{ matrix.goarch }}
          EXT: ${{ matrix.ext }}
        run: |
          # Native runner per OS; do not cross-compile with CGO.
          plugin="grok-inspection.${EXT}"
          versioned="grok-inspection_${VERSION}_${GOOS_NAME}_${GOARCH_NAME}.${EXT}"
          go build \
            -buildvcs=false \
            -buildmode=c-shared \
            -o "${plugin}" \
            .
          cp "${plugin}" "${versioned}"
          go version -m "${plugin}" | tee build-info.txt
          grep -q "GOOS=${GOOS_NAME}" build-info.txt
          grep -q "GOARCH=${GOARCH_NAME}" build-info.txt
          echo "plugin=${plugin}" >> "$GITHUB_OUTPUT"
          echo "versioned=${versioned}" >> "$GITHUB_OUTPUT"
          echo "zip=grok-inspection_${VERSION}_${GOOS_NAME}_${GOARCH_NAME}.zip" >> "$GITHUB_OUTPUT"

      - name: Pack archive
        id: package
        shell: pwsh
        env:
          PLUGIN: ${{ steps.build.outputs.plugin }}
          VERSIONED: ${{ steps.build.outputs.versioned }}
          ZIP: ${{ steps.build.outputs.zip }}
        run: |
          Compress-Archive -Path $env:PLUGIN,$env:VERSIONED,build-info.txt -DestinationPath $env:ZIP -Force
          "asset=$env:ZIP" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ steps.build.outputs.versioned }}
            ${{ steps.build.outputs.zip }}
            build-info.txt
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_TAG}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout release notes
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Resolve release notes
        id: notes
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          notes_file=".github/release-notes/${RELEASE_TAG}.md"
          if [[ ! -s "${notes_file}" ]]; then
            echo "missing release notes: ${notes_file}" >&2
            exit 1
          fi
          echo "file=${notes_file}" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd assets
          ls -la
          # checksums for every plugin binary and zip
          : > checksums.txt
          find . -maxdepth 1 -type f \( -name '*.so' -o -name '*.dylib' -o -name '*.dll' -o -name '*.zip' \)             | sed 's|^./||' | sort | while read -r f; do
              sha256sum "$f" >> checksums.txt
            done
          cat checksums.txt

      - name: Upload assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          GH_REPO: ${{ github.repository }}
          RELEASE_NOTES_FILE: ${{ steps.notes.outputs.file }}
        run: |
          shopt -s nullglob
          files=(assets/*.{so,dylib,dll,zip} assets/checksums.txt)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "no release assets found" >&2
            exit 1
          fi
          # Prefer bare plugin binaries on the release page (plus zip + checksums).
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "Grok Inspection ${RELEASE_TAG}" \
              --notes-file "${RELEASE_NOTES_FILE}"
            gh release upload "${RELEASE_TAG}" "${files[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" \
              --title "Grok Inspection ${RELEASE_TAG}" \
              --notes-file "${RELEASE_NOTES_FILE}" \
              "${files[@]}"
          fi
