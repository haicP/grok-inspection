name: CI

# Push / PR 后自动测试并编译多平台插件产物（无需本机安装 Go）
on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test & Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: so
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: dll
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: dylib

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21.x"
          cache: true

      - name: Install Linux C toolchain
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Test
        shell: bash
        run: go test ./... -count=1

      - name: Build plugin (c-shared)
        shell: bash
        env:
          CGO_ENABLED: "1"
        run: |
          mkdir -p dist
          go build \
            -buildvcs=false \
            -buildmode=c-shared \
            -o "dist/grok-inspection.${{ matrix.ext }}" \
            .
          ls -la dist

      - name: Pack zip
        shell: bash
        run: |
          cd dist
          # zip is available on ubuntu/mac; on windows use powershell fallback
          asset="grok-inspection_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          if command -v zip >/dev/null 2>&1; then
            zip -9 "$asset" "grok-inspection.${{ matrix.ext }}"
          else
            powershell -NoProfile -Command "Compress-Archive -Path 'grok-inspection.${{ matrix.ext }}' -DestinationPath '$asset' -Force"
          fi
          ls -la

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: grok-inspection-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/grok-inspection.${{ matrix.ext }}
            dist/grok-inspection_${{ matrix.goos }}_${{ matrix.goarch }}.zip
          if-no-files-found: error
          retention-days: 30
